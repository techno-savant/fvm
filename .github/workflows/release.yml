name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          VERSION="${{ github.event.release.tag_name }}"
          mkdir -p dist
          if [ "${GOOS}" = "windows" ]; then
            go build -o dist/fvm.exe ./cmd/fvm
            cd dist
            zip "fvm_${VERSION}_${GOOS}_${GOARCH}.zip" fvm.exe
            rm -f fvm.exe
            cd ..
          else
            go build -o dist/fvm ./cmd/fvm
            tar -C dist -czf "dist/fvm_${VERSION}_${GOOS}_${GOARCH}.tar.gz" fvm
            rm -f dist/fvm
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/fvm_${{ github.event.release.tag_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.*

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          VERSION="${{ github.event.release.tag_name }}"
          sha256sum fvm_${VERSION}_* > checksums.sha256

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          gh release upload "${VERSION}" dist/*.tar.gz dist/*.zip dist/checksums.sha256 --clobber
