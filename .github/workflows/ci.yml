name: ci

on:
  push:
  pull_request:

jobs:
  test:
    name: test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.22', '1.23']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Format check
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build ./cmd/fvm

  installer-lint:
    name: installer syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: sh -n
        run: bash -n scripts/install.sh
